version: '3.8'

services:
  db:
    image: postgres:15
    container_name: unt_postgres
    environment:
      POSTGRES_USER: unt
      POSTGRES_PASSWORD: unt123
      POSTGRES_DB: unt_sistema
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unt"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: unt_backend
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://unt:unt123@db:5432/unt_sistema
      JWT_SECRET: secret_key_change_in_production
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: unt_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data: